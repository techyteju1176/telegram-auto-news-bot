name: Max_AutoNewsbot

on:
  schedule:
    # 🌅 Full Digest - 9:00 AM IST (3:30 UTC)
    - cron: "30 3 * * *"

    # 🕒 Auto updates (IST converted to UTC)
    - cron: "0 2 * * *"   # 7:30 AM IST
    - cron: "0 4 * * *"   # 9:30 AM IST
    - cron: "0 6 * * *"   # 11:30 AM IST
    - cron: "0 8 * * *"   # 1:30 PM IST
    - cron: "0 10 * * *"  # 3:30 PM IST
    - cron: "0 12 * * *"  # 5:30 PM IST
    - cron: "0 14 * * *"  # 7:30 PM IST
    - cron: "0 16 * * *"  # 9:30 PM IST
    - cron: "0 18 * * *"  # 11:30 PM IST

  workflow_dispatch:

jobs:
  run-news-bot:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🚀 Run bot
      - name: Run Auto News Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bot.py
